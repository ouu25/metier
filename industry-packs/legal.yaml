  - name: Technical Skills Match
    weight: 0.20
  - name: Industry Experience
    weight: 0.15
  - name: Certification Alignment
    weight: 0.15
  - name: Seniority Fit
    weight: 0.10
  - name: Soft Skills
    weight: 0.05
  - name: Tool Proficiency
    weight: 0.05
  - name: Company Culture Fit
    weight: 0.05
