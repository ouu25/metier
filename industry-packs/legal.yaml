  - name: LawJobs
    url: https://www.lawjobs.com
  - name: Robert Half Legal
    url: https://www.roberthalf.com/legal
interview_questions:
  technical:
    - "How do you approach reviewing a commercial contract for risk?"
    - "Walk me through a due diligence process for an acquisition"
    - "How do you ensure GDPR compliance across multiple jurisdictions?"
    - "Explain how you would handle a potential IP infringement"
  behavioral:
    - "Tell me about a time you had to deliver unwelcome legal advice to leadership"
    - "How do you prioritize when managing multiple active matters?"
    - "Describe a situation where you found a creative legal solution to a business problem"
  case:
    - "A key vendor breaches their SLA. Walk me through your response strategy"
resume_style: conservative
