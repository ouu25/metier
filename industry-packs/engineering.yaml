scoring_dimensions:
  - name: Technical Depth
    weight: 0.25
  - name: System Design
    weight: 0.15
  - name: Tool Proficiency
    weight: 0.15
  - name: Industry Experience
    weight: 0.10
  - name: Seniority Fit
    weight: 0.10
  - name: Location Match
    weight: 0.05
  - name: Soft Skills
    weight: 0.10
  - name: Company Culture Fit
    weight: 0.05
  - name: Growth Potential
    weight: 0.05
job_portals:
  - name: StackOverflow Jobs
    url: https://stackoverflow.com/jobs
  - name: HackerNews Who's Hiring
    url: https://news.ycombinator.com
interview_questions:
  technical:
    - "Design a URL shortener service"
    - "How would you debug a slow API endpoint?"
    - "Explain the CAP theorem and its practical implications"
